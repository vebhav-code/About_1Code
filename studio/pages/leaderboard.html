<div class="page-header">
  <div class="page-header-copy">
    <span class="page-eyebrow">Rankings</span>
    <h3>Global Leaderboard</h3>
  </div>
</div>

<div class="card-sm" style="background:var(--bg-muted);border:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;gap:12px">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="leaderboard-search" class="form-input" placeholder="Search by user name or challenge..." style="border:none;background:transparent;padding:4px 0;font-size:0.875rem" />
</div>

<div class="table-container">
  <div class="table-header">
    <div class="table-title-group">
      <span class="table-eyebrow">Rankings</span>
      <h4 class="table-title">Top 100 Submissions</h4>
    </div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th style="width: 80px;">Rank</th>
          <th>User</th>
          <th>Score</th>
          <th>Challenge</th>
          <th>Submitted At</th>
        </tr>
      </thead>
      <tbody id="leaderboard-list">
        <tr class="table-empty">
          <td colspan="5">Loading rankings...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
