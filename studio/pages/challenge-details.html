<div class="page-header">
  <div class="page-header-copy">
    <span class="page-eyebrow">Challenge Details</span>
    <h3 id="challenge-title">Challenge title</h3>
    <p style="margin-top: 6px; font-size: 0.83rem; color: var(--text-secondary)">
      Slug: <span id="challenge-slug" class="mono">--</span>
    </p>
  </div>
  <div class="action-row">
    <button id="edit-challenge" class="button button-secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
      Edit Challenge
    </button>
    <button id="activate-challenge" class="button button-success" hidden>Activate</button>
    <button id="deactivate-challenge" class="button button-danger" hidden>Deactivate</button>
  </div>
</div>

<div class="detail-grid">
  <div style="display: flex; flex-direction: column; gap: 20px;">
    <div class="card" style="display: flex; flex-direction: column; gap: 20px;">
      <div class="preview-field">
        <span class="preview-field-label">Description</span>
        <p id="challenge-description" style="line-height:1.6;color:var(--text-secondary)"></p>
      </div>
      <div class="preview-field">
        <span class="preview-field-label">Scenario</span>
        <p id="challenge-scenario" style="line-height:1.6;color:var(--text-secondary)"></p>
      </div>
      <div class="preview-field">
        <span class="preview-field-label">Rules</span>
        <p id="challenge-rules" style="line-height:1.6;color:var(--text-secondary)"></p>
      </div>
    </div>

    <div class="table-container">
      <div class="table-header">
        <div class="table-title-group">
          <span class="table-eyebrow">Statistics</span>
          <h4 class="table-title">Performance metrics</h4>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;padding:20px;gap:20px">
        <div class="card-sm" style="background:var(--bg-muted);display:flex;flex-direction:column;gap:4px">
          <span style="font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase">Total Participants</span>
          <strong id="stat-participants" style="font-size:1.8rem;font-weight:800">--</strong>
        </div>
        <div class="card-sm" style="background:var(--bg-muted);display:flex;flex-direction:column;gap:4px">
          <span style="font-size:0.75rem;color:var(--muted);font-weight:600;text-transform:uppercase">Average Score</span>
          <strong id="stat-average" style="font-size:1.8rem;font-weight:800">--</strong>
        </div>
      </div>
    </div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 20px;">
    <div class="card" style="display: flex; flex-direction: column; gap: 14px;">
      <h4 style="font-size:0.95rem;font-weight:700;margin-bottom:6px">Metadata</h4>
      <div class="detail-meta-item">
        <span class="detail-meta-label">Difficulty</span>
        <span id="challenge-difficulty" class="detail-meta-value">--</span>
      </div>
      <div class="detail-meta-item">
        <span class="detail-meta-label">Time Limit</span>
        <span id="challenge-time" class="detail-meta-value">--</span>
      </div>
      <div class="detail-meta-item">
        <span class="detail-meta-label">Status</span>
        <span id="challenge-status" class="detail-meta-value">--</span>
      </div>
      <div class="detail-meta-item">
        <span class="detail-meta-label">Created</span>
        <span id="challenge-created" class="detail-meta-value">--</span>
      </div>
    </div>

    <div class="card" style="display: flex; flex-direction: column; gap: 14px;">
      <h4 style="font-size:0.95rem;font-weight:700;margin-bottom:6px">Resources</h4>
      <button class="button button-secondary" id="download-reference" style="width:100%">Download Reference Files</button>
    </div>
  </div>
</div>
