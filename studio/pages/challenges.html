<div class="page-header" style="margin-bottom: 24px;">
  <div class="page-header-copy">
    <span class="page-eyebrow">Challenges</span>
    <h3>Challenge Catalogue</h3>
  </div>
  <button id="new-challenge" class="button button-primary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Upload Challenge
  </button>
</div>

<div class="card-sm" style="background:var(--bg-muted);border:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:240px">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="challenge-search" class="form-input" placeholder="Search by title, slug, or difficulty..." style="border:none;background:transparent;padding:4px 0;font-size:0.875rem" />
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:0.8rem;color:var(--text-secondary);font-weight:600">Status:</span>
    <select id="challenge-filter" class="form-select" style="padding:6px 12px;font-size:0.83rem;width:120px">
      <option value="all">All</option>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>
  </div>
</div>

<div class="table-container">
  <div class="table-header">
    <div class="table-title-group">
      <span class="table-eyebrow">Catalogue</span>
      <h4 class="table-title">All Challenges</h4>
    </div>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Slug</th>
          <th>Title</th>
          <th>Difficulty</th>
          <th>Status</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="challenge-list">
        <tr class="table-empty">
          <td colspan="6">Loading challenge catalogue...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
